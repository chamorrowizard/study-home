<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JavaScript – Study Plan</title>

  <!-- Optional: reuse your shared CSS file -->
  <link rel="stylesheet" href="flashcards-responsive.css" />

  <style>
    :root {
      --bg1: #071426;
      --bg2: #0e2a4f;
      --accent: #7dd3fc;
      --accent-2: #60a5fa;
      --glass: rgba(255, 255, 255, 0.06);
      --muted: rgba(255, 255, 255, 0.75);
      --card-width: min(880px, 86vw);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(1200px 600px at 10% 10%, rgba(96, 165, 250, 0.06), transparent 80%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      color: #f8fafc;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding: 32px;
    }

    .app {
      width: var(--card-width);
      max-width: 100%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent);
      border-radius: 18px;
      box-shadow:
        0 18px 40px rgba(2, 6, 23, 0.8),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
      padding: 24px 22px 26px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: grid;
      place-items: center;
      font-weight: 800;
      color: #02101f;
      box-shadow: 0 12px 26px rgba(15, 23, 42, 0.7);
      letter-spacing: 0.04em;
    }

    .title-block {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .title-block h1 {
      margin: 0;
      font-size: 1.6rem;
      letter-spacing: 0.02em;
    }

    .title-block p {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .header-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      background: var(--glass);
      color: var(--muted);
      border: none;
      padding: 9px 14px;
      border-radius: 999px;
      cursor: pointer;
      min-width: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-weight: 600;
      font-size: 0.85rem;
      transition:
        transform 0.16s ease-out,
        box-shadow 0.16s ease-out,
        background 0.16s ease-out;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.6);
      text-decoration: none;
    }

    .btn.primary {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: #031124;
      box-shadow: 0 10px 28px rgba(37, 99, 235, 0.35);
    }

    .btn.ghost {
      background: transparent;
      border: 1px solid rgba(148, 163, 184, 0.45);
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.6);
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn:focus-visible {
      outline: 3px solid rgba(125, 211, 252, 0.8);
      outline-offset: 3px;
    }

    /* Big empty area for future buttons */
    .subject-area {
      border-radius: 16px;
      padding: 20px;
      border: 1px dashed rgba(148, 163, 184, 0.4);
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.85));
      min-height: 260px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .subject-area-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .subject-area-title {
      font-size: 1rem;
      font-weight: 600;
      color: #e5e7eb;
    }

    .subject-area-subtitle {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .subject-grid {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
    }

    .subject-button {
      width: 100%;
      justify-content: center;
    }

    @media (max-width: 720px) {
      body {
        padding: 20px;
      }
      .app {
        padding: 18px 16px 20px;
      }
      .title-block h1 {
        font-size: 1.4rem;
      }
    }
    /* Slider styles for swipe deck */
    .slider-wrapper { position: relative; width: 100%; }
    .nav-arrow {
      display: none; position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(15,23,42,0.6); border: 1px solid rgba(255,255,255,0.06);
      color: #fff; width: 42px; height: 42px; border-radius: 50%; cursor: pointer;
      z-index: 10; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      font-size: 1.1rem;
    }
    .nav-arrow:hover { background: var(--accent); color: #02101f; }
    .nav-arrow.prev { left: -54px; }
    .nav-arrow.next { right: -54px; }
    @media (min-width: 620px) { .nav-arrow { display: flex; } }

    .slider-container {
      width: 100%; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth;
      display: flex; gap: 16px; padding: 12px 4px 24px; box-sizing: border-box; scrollbar-width: none;
    }
    .slider-container::-webkit-scrollbar { display: none; }
    .slide-card {
      flex: 0 0 100%; scroll-snap-align: center; box-sizing: border-box; border-radius: 16px;
      padding: 18px; background: linear-gradient(145deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid rgba(255,255,255,0.03); box-shadow: 0 18px 40px rgba(2,6,23,0.8);
      display: flex; flex-direction: column; gap: 12px;
    }
    .pagination-dots { display:flex; justify-content:center; gap:8px; margin-top:-6px; }
    .dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.18); transition:all 0.25s ease; }
    .dot.active { width:18px; background:var(--accent); border-radius:3px; }
  </style>
</head>
<body>
  <main class="app" role="main" aria-label="JavaScript page">
    <header class="header">
      <div class="brand">
        <div class="logo" aria-hidden="true">CS</div>
        <div class="title-block">
          <h1>CompTIA Security + </h1>
          <p>Security+ is the foundational credential required to meet baseline DoD Directive 8140/8570 requirements for cybersecurity positions.</p>
        </div>
      </div>
      <div class="header-actions">
        <a class="btn ghost" href="https://chamorrowizard.github.io/study-home/">
          ← Back
        </a>
      </div>
    </header>

    <div class="slider-wrapper">
      <button class="nav-arrow prev" onclick="moveSlider(-1)" aria-label="Previous slide">←</button>
      <button class="nav-arrow next" onclick="moveSlider(1)" aria-label="Next slide">→</button>

      <div class="slider-container" id="deckSlider">
        <section class="slide-card">
          <h2 style="margin:0 0 8px 0; font-size:1.05rem;">Security</h2>
          <div class="subject-area" aria-label="JavaScript study options">
            <div class="subject-area-header">
              <div>
                <div class="subject-area-title">Study buttons</div>
                <div class="subject-area-subtitle">Start with one, add more subjects whenever you want.</div>
              </div>
            </div>

            <div class="subject-grid">
              <a href="./Chapter 1/1-1.html">
                <button class="btn primary subject-button" type="button">1.1 Security Controls</button>
              </a>
              
            </div>
          </div>
        </section>

        <section class="slide-card">
          <h2 style="margin:0 0 8px 0; font-size:1.05rem;">Quick Links</h2>
          <div style="display:flex; flex-direction:column; gap:12px;">
            <a class="btn primary" href="https://chamorrowizard.github.io/function-flashcards/">Functions Cards</a>
            
          </div>
        </section>
        
      </div>
    </div>

    <div class="pagination-dots">
      <div class="dot active" id="dot1"></div>
      <div class="dot" id="dot2"></div>
    </div>

    <script>
      const slider = document.getElementById('deckSlider');
      const dot1 = document.getElementById('dot1');
      const dot2 = document.getElementById('dot2');

      slider.addEventListener('scroll', () => {
        const scrollIndex = Math.round(slider.scrollLeft / slider.offsetWidth);
        if (scrollIndex === 0) {
          dot1.classList.add('active'); dot2.classList.remove('active');
        } else {
          dot2.classList.add('active'); dot1.classList.remove('active');
        }
      });

      function moveSlider(direction) {
        const cardWidth = slider.offsetWidth;
        slider.scrollBy({ left: direction * cardWidth, behavior: 'smooth' });
      }
    </script>
  </main>
</body>
</html>
